{% extends "users/base_manage_password.html" %}

{% load i18n %}
{% load crispy_forms_tags %}

{% block head_title %}
  {% trans "Set Password" %}
{% endblock head_title %}
{% block manage_content %}
  <h1>{% trans "Set Password" %}</h1>
  <form method="post"
        action="{% url 'account_set_password' %}"
        class="password_set">
    {% csrf_token %}
    {{ form|crispy }}
    <div class="d-grid gap-2 d-md-block">
      <button type="submit" name="action" class="btn btn-primary">{% trans "Set Password" %}</button>
    </div>
  </form>
{% endblock manage_content %}
